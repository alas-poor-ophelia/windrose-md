name: Release Obsidian Plugin

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v2.0.0-preview)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build production
        run: npm run build:prod

      - name: Read version from manifest
        id: meta
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify artifacts exist
        run: |
          test -f main.js || { echo "main.js not found"; exit 1; }
          test -f styles.css || { echo "styles.css not found"; exit 1; }
          test -f manifest.json || { echo "manifest.json not found"; exit 1; }
          echo "main.js: $(wc -c < main.js) bytes"
          echo "styles.css: $(wc -c < styles.css) bytes"

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Windrose MapDesigner ${{ steps.meta.outputs.version }}"
          draft: false
          prerelease: ${{ contains(steps.meta.outputs.version, '-') }}
          files: |
            main.js
            styles.css
            manifest.json
